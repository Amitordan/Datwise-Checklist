<!DOCTYPE html>
<html dir="rtl" lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>צ׳ק ליסט מעבר משרד - Datwise</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  :root {
    --bg: #f4f6f9; --card: #ffffff; --ink: #1f2937; --muted: #6b7280;
    --line: #e5e7eb; --brand: #2b3a67; --brand-soft: #eef1f8;
    --blue: #3a7bd5; --done: #10936e; --done-soft: #e7f5f0; --danger: #c0392b;
    --shadow: 0 1px 3px rgba(16,24,40,.06), 0 1px 2px rgba(16,24,40,.04);
  }
  * { box-sizing: border-box; }
  body { direction: rtl; text-align: right; margin: 0; font-family: "Heebo","Segoe UI",Arial,sans-serif; background: var(--bg); color: var(--ink); line-height: 1.55; -webkit-font-smoothing: antialiased; }
  code, pre { direction: ltr; text-align: left; unicode-bidi: embed; font-family: ui-monospace, Menlo, Consolas, monospace; }

  header.top { background: linear-gradient(135deg,#16233b 0%,#1d3357 55%,#27508a 100%); color: #fff; padding: 16px 20px; position: sticky; top: 0; z-index: 30; box-shadow: var(--shadow); }
  .top-row { display: flex; align-items: center; gap: 13px; flex-wrap: wrap; max-width: 980px; margin: 0 auto; }
  .logo-badge { background: #fff; border: 1px solid #e6e9ef; border-radius: 13px; padding: 7px 9px; display: inline-flex; align-items: center; justify-content: center; box-shadow: 0 3px 10px rgba(0,0,0,.22); flex-shrink: 0; }
  .logo { height: 42px; width: auto; display: block; }
  .brand-text { flex: 1; min-width: 140px; }
  .brand-text h1 { font-size: 18px; font-weight: 700; margin: 0; letter-spacing: .2px; }
  .brand-text .sub { font-size: 12.5px; color: #aebfd9; font-weight: 500; margin-top: 2px; }
  .who { display: flex; align-items: center; gap: 9px; flex-wrap: wrap; }
  .conn { display: inline-flex; align-items: center; gap: 6px; font-size: 12px; color: #cbd5e6; background: rgba(255,255,255,.1); border: 1px solid rgba(255,255,255,.18); padding: 4px 9px; border-radius: 99px; }
  .conn.live { color: #bfe6d4; background: rgba(52,211,153,.16); border-color: rgba(52,211,153,.35); }
  .conn .dot { width: 7px; height: 7px; border-radius: 50%; background: #9ca3af; }
  .conn.live .dot { background: #34d399; }
  .user-chip { display: inline-flex; align-items: center; gap: 7px; font-size: 12.5px; background: rgba(255,255,255,.12); border: 1px solid rgba(255,255,255,.2); padding: 4px 11px 4px 6px; border-radius: 99px; color: #fff; }
  .user-chip .avatar { width: 22px; height: 22px; border-radius: 50%; background: var(--blue); display: inline-flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 600; }
  .who > button { background: rgba(255,255,255,.14); color: #fff; border: 1px solid rgba(255,255,255,.22); border-radius: 8px; padding: 6px 11px; font: inherit; font-size: 12px; cursor: pointer; }
  .who > button:hover { background: rgba(255,255,255,.24); }

  .progress-wrap { max-width: 980px; margin: 12px auto 0; }
  .progress-bar { height: 8px; background: rgba(255,255,255,.2); border-radius: 99px; overflow: hidden; }
  .progress-fill { height: 100%; background: linear-gradient(90deg,#3a7bd5,#5b9ae8); width: 0; transition: width .35s ease; border-radius: 99px; }
  .progress-label { font-size: 12px; color: #cdd9ee; margin-top: 6px; }

  main { max-width: 980px; margin: 0 auto; padding: 18px 16px 96px; }

  .toolbar { display: flex; justify-content: flex-end; margin-bottom: 12px; }
  .btn-primary { background: var(--blue); color: #fff; border: none; border-radius: 10px; padding: 10px 16px; font: inherit; font-size: 14px; font-weight: 600; cursor: pointer; display: inline-flex; align-items: center; gap: 6px; box-shadow: var(--shadow); }
  .btn-primary:hover { background: #2f6cc0; }

  .section { margin-bottom: 18px; }
  .section-head { display: flex; align-items: center; gap: 10px; font-size: 15px; font-weight: 700; color: var(--brand); padding: 6px 4px; cursor: pointer; user-select: none; }
  .section-head .chev { transition: transform .2s; font-size: 12px; color: var(--muted); }
  .section.collapsed .chev { transform: rotate(-90deg); }
  .section-head .count { font-size: 12px; font-weight: 500; color: var(--muted); background: var(--brand-soft); padding: 2px 9px; border-radius: 99px; }
  .section.collapsed .tasks { display: none; }

  .task { background: var(--card); border: 1px solid var(--line); border-radius: 12px; padding: 12px 14px; margin-bottom: 9px; box-shadow: var(--shadow); }
  .task.done { background: var(--done-soft); border-color: #cdeadd; }
  .task-main { display: flex; align-items: flex-start; gap: 11px; }
  .check { appearance: none; -webkit-appearance: none; width: 24px; height: 24px; min-width: 24px; margin-top: 1px; border: 2px solid #cbd2dc; border-radius: 6px; cursor: pointer; position: relative; background: #fff; }
  .check:checked { background: var(--done); border-color: var(--done); }
  .check:checked::after { content: "✓"; color: #fff; position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 700; }
  .task-body { flex: 1; min-width: 0; }
  .title-line { display: flex; align-items: center; gap: 6px; }
  .title { font-size: 15px; font-weight: 500; word-break: break-word; flex: 1; }
  .task.done .title { color: var(--muted); text-decoration: line-through; }
  .title-edit { font: inherit; font-size: 15px; border: 1px solid var(--brand); border-radius: 6px; padding: 4px 8px; width: 100%; }

  .meta { display: flex; gap: 16px; flex-wrap: wrap; margin-top: 7px; font-size: 12.5px; color: var(--muted); align-items: center; }
  .meta input { font: inherit; font-size: 12.5px; border: 1px solid var(--line); border-radius: 6px; padding: 4px 7px; background: #fff; color: var(--ink); }
  .meta input.owner { width: 110px; }
  .meta .donemark { color: var(--done); font-weight: 600; }

  .icon-btn { background: none; border: none; cursor: pointer; color: var(--muted); font-size: 15px; padding: 6px 8px; border-radius: 8px; min-width: 34px; min-height: 34px; display: inline-flex; align-items: center; justify-content: center; }
  .icon-btn:hover { background: var(--brand-soft); color: var(--brand); }
  .icon-btn.danger:hover { background: #fde8e6; color: var(--danger); }

  .notes { margin-top: 10px; padding-top: 9px; border-top: 1px dashed var(--line); }
  .note { font-size: 13px; padding: 5px 0; display: flex; gap: 8px; }
  .note .note-by { font-weight: 600; color: var(--brand); white-space: nowrap; }
  .note .note-meta { color: var(--muted); font-size: 11px; }
  .note .note-text { word-break: break-word; }
  .note-add { display: flex; gap: 7px; margin-top: 7px; }
  .note-add input { flex: 1; min-width: 0; font: inherit; font-size: 13px; border: 1px solid var(--line); border-radius: 8px; padding: 8px 10px; }
  .note-add button { background: var(--brand); color: #fff; border: none; border-radius: 8px; padding: 0 16px; font: inherit; font-size: 13px; cursor: pointer; }
  .note-toggle { font-size: 12.5px; color: var(--brand); background: none; border: none; cursor: pointer; padding: 4px 0; margin-top: 4px; font-weight: 500; }

  .overlay { position: fixed; inset: 0; background: rgba(31,41,55,.55); display: flex; align-items: center; justify-content: center; z-index: 60; padding: 18px; }
  .modal { position: relative; background: #fff; border-radius: 16px; padding: 26px 24px; max-width: 460px; width: 100%; box-shadow: 0 20px 50px rgba(0,0,0,.25); }
  .modal h2 { margin: 0 0 6px; font-size: 19px; color: var(--brand); }
  .modal p { margin: 0 0 16px; color: var(--muted); font-size: 14px; }
  .modal label { display: block; font-size: 13px; color: var(--muted); margin: 0 0 5px; font-weight: 500; }
  .modal input, .modal select { width: 100%; font: inherit; font-size: 16px; border: 1px solid var(--line); border-radius: 10px; padding: 12px 14px; margin-bottom: 14px; background: #fff; color: var(--ink); }
  .modal > button.primary { width: 100%; background: var(--brand); color: #fff; border: none; border-radius: 10px; padding: 13px; font: inherit; font-size: 16px; font-weight: 600; cursor: pointer; }
  .modal-close { position: absolute; top: 10px; left: 12px; width: 34px; height: 34px; background: none; border: none; font-size: 22px; line-height: 1; color: var(--muted); cursor: pointer; border-radius: 8px; padding: 0; }
  .modal-close:hover { background: #f1f3f7; color: var(--ink); }
  .modal .btn-row { display: flex; gap: 10px; }
  .modal .btn-row button { flex: 1; width: auto; border: none; border-radius: 10px; padding: 13px; font: inherit; font-size: 15px; font-weight: 600; cursor: pointer; }
  .btn-danger { background: var(--danger); color: #fff; }
  .btn-ghost { background: #eef0f3; color: var(--ink); }

  .setup-steps { text-align: right; font-size: 13.5px; color: var(--ink); }
  .setup-steps li { margin-bottom: 7px; }
  .setup-steps code { background: #f1f3f7; padding: 1px 5px; border-radius: 4px; font-size: 12px; }
  .add-area { background: var(--card); border: 1px dashed #cbd2dc; border-radius: 12px; padding: 14px; }
  .add-area h3 { margin: 0 0 10px; font-size: 14px; color: var(--brand); }

  .toast { position: fixed; bottom: 22px; left: 50%; transform: translateX(-50%); background: #1f2937; color: #fff; padding: 11px 18px; border-radius: 10px; font-size: 14px; box-shadow: 0 8px 24px rgba(0,0,0,.2); z-index: 80; opacity: 0; transition: opacity .2s, transform .2s; pointer-events: none; max-width: 90vw; text-align: center; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(-4px); }

  @media (max-width: 600px) {
    header.top { padding: 13px 14px; }
    .top-row { gap: 10px; }
    .brand-text { min-width: 110px; }
    .brand-text h1 { font-size: 16px; }
    .brand-text .sub { font-size: 11.5px; }
    .logo { height: 36px; }
    .logo-badge { padding: 6px 8px; border-radius: 11px; }
    .who { width: 100%; justify-content: flex-start; gap: 8px; }
    main { padding: 16px 12px 96px; }
    .meta { gap: 10px 14px; }
    .meta input.owner { width: 92px; }
    .meta input[type=date] { max-width: 140px; }
    .btn-primary { padding: 11px 16px; }
  }
  @media (max-width: 380px) {
    .brand-text .sub { display: none; }
  }
</style>
</head>

    <div class="brand-text">
      <h1>צ׳ק ליסט מעבר משרד</h1>
      <div class="sub">Datwise · ניהול מעבר משרד</div>
    </div>
    <div class="who">
      <span class="conn" id="connPill"><span class="dot" id="liveDot"></span><span id="connText">מתחבר…</span></span>
      <span class="user-chip" id="userChip"><span class="avatar" id="userAvatar">–</span><span id="meName">—</span></span>
      <button id="changeName" title="שינוי שם">שינוי שם</button>
    </div>
  </div>
  <div class="progress-wrap">
    <div class="progress-bar"><div class="progress-fill" id="progFill"></div></div>
    <div class="progress-label" id="progLabel">טוען…</div>
  </div>
</header>

<main id="app"><p style="color:var(--muted);text-align:center;margin-top:40px">טוען משימות…</p></main>

<script>
let supa = null;
let tasks = [];
let myName = localStorage.getItem("om_name") || "";
const openNotes = new Set();
const noteDrafts = {};
const collapsedSections = new Set();
const app = document.getElementById("app");

/* ---------- כלי עזר UX ---------- */
let toastTimer;
function toast(msg) {
  let t = document.getElementById("toast");
  if (!t) { t = document.createElement("div"); t.id = "toast"; t.className = "toast"; document.body.appendChild(t); }
  t.textContent = msg; t.classList.add("show");
  clearTimeout(toastTimer); toastTimer = setTimeout(() => t.classList.remove("show"), 2200);
}
function openOverlay(innerHtml, closeable) {
  const ov = document.createElement("div"); ov.className = "overlay";
  ov.innerHTML = `<div class="modal">${closeable ? '<button class="modal-close" aria-label="סגירה">&times;</button>' : ''}${innerHtml}</div>`;
  document.body.appendChild(ov);
  const close = () => { ov.remove(); document.removeEventListener("keydown", onKey); };
  function onKey(e) { if (e.key === "Escape" && closeable) close(); }
  if (closeable) {
    ov.querySelector(".modal-close").onclick = close;
    ov.addEventListener("mousedown", (e) => { if (e.target === ov) close(); });
    document.addEventListener("keydown", onKey);
  }
  return { ov, close };
}
function confirmDialog(msg, onYes) {
  const { ov, close } = openOverlay(`
    <h2>אישור מחיקה</h2>
    <p>${msg}</p>
    <div class="btn-row">
      <button class="btn-danger" id="cfYes">מחיקה</button>
      <button class="btn-ghost" id="cfNo">ביטול</button>
    </div>`, true);
  ov.querySelector("#cfYes").onclick = () => { close(); onYes(); };
  ov.querySelector("#cfNo").onclick = close;
}

/* ---------- אתחול ---------- */
function configReady() {
  return SUPABASE_URL && SUPABASE_ANON_KEY && !SUPABASE_URL.includes("PASTE_") && !SUPABASE_ANON_KEY.includes("PASTE_");
}
function showSetupNeeded() {
  document.getElementById("progLabel").textContent = "ממתין להגדרת חיבור";
  app.innerHTML = `
    <div class="add-area" style="border-style:solid">
      <h3>נשאר רק לחבר את הקובץ ל-Supabase</h3>
      <ol class="setup-steps">
        <li>ב-Supabase: Project Settings ‹ API.</li>
        <li>העתק את ה-<code>Project URL</code> ואת ה-<code>anon public key</code>.</li>
        <li>הדבק אותם בקובץ, בשתי השורות שמסומנות למעלה (<code>SUPABASE_URL</code>, <code>SUPABASE_ANON_KEY</code>).</li>
        <li>שמור, העלה ל-GitHub Pages ושלח את הקישור למנהלים.</li>
      </ol>
    </div>`;
}
async function init() {
  updateMe();
  if (!configReady()) { showSetupNeeded(); return; }
  supa = supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);
  if (!myName) askName(true);
  await loadTasks();
  subscribe();
}
async function loadTasks() {
  const { data, error } = await supa.from("tasks").select("*").order("position", { ascending: true });
  if (error) { app.innerHTML = `<p style="color:var(--danger);text-align:center;margin-top:40px">שגיאת חיבור: ${error.message}</p>`; return; }
  tasks = data || []; render();
}
function subscribe() {
  supa.channel("tasks-live")
    .on("postgres_changes", { event: "*", schema: "public", table: "tasks" }, () => loadTasks())
    .subscribe((status) => {
      const live = status === "SUBSCRIBED";
      document.getElementById("connPill").classList.toggle("live", live);
      document.getElementById("connText").textContent = live ? "מחובר" : "מתחבר…";
    });
}

/* ---------- שם משתמש ---------- */
function updateMe() {
  document.getElementById("meName").textContent = myName || "—";
  document.getElementById("userAvatar").textContent = myName ? myName.trim().charAt(0) : "–";
}
function askName(first) {
  const { ov, close } = openOverlay(`
    <h2>${first ? "ברוך הבא" : "שינוי שם"}</h2>
    <p>איך לקרוא לך? השם יופיע ליד משימות שתסמן והערות שתכתוב.</p>
    <input id="nameInput" placeholder="השם שלך" maxlength="40">
    <button class="primary" id="saveName">שמירה</button>`, !first);
  const input = ov.querySelector("#nameInput");
  input.value = myName; input.focus();
  const save = () => {
    const v = input.value.trim();
    if (!v) { input.focus(); return; }
    myName = v; localStorage.setItem("om_name", v); updateMe(); close(); toast("השם נשמר");
  };
  ov.querySelector("#saveName").onclick = save;
  input.onkeydown = (e) => { if (e.key === "Enter") save(); };
}
document.getElementById("changeName").onclick = () => askName(false);

/* ---------- יצירת משימה (מודאל) ---------- */
function openAddTask() {
  const order = [...new Set(tasks.map(t => t.section))];
  const opts = order.map(s => `<option value="${esc(s)}">${esc(s)}</option>`).join("");
  const { ov, close } = openOverlay(`
    <h2>משימה חדשה</h2>
    <label>קטגוריה</label>
    <select id="atSec">${opts}<option value="__new__">+ קטגוריה חדשה…</option></select>
    <div id="atNewWrap" style="display:none"><label>שם הקטגוריה החדשה</label><input id="atNew" placeholder="לדוגמה: 9. ביטוח ורישוי"></div>
    <label>תיאור המשימה</label>
    <input id="atTitle" placeholder="מה צריך לעשות">
    <label>אחראי (לא חובה)</label>
    <input id="atOwner" placeholder="שם האחראי">
    <label>תאריך יעד (לא חובה)</label>
    <input type="date" id="atDue">
    <button class="primary" id="atSave">הוספת משימה</button>`, true);
  const sec = ov.querySelector("#atSec");
  const newWrap = ov.querySelector("#atNewWrap");
  sec.onchange = () => { newWrap.style.display = sec.value === "__new__" ? "block" : "none"; };
  ov.querySelector("#atTitle").focus();
  ov.querySelector("#atSave").onclick = async () => {
    const section = sec.value === "__new__" ? ov.querySelector("#atNew").value.trim() : sec.value;
    const title = ov.querySelector("#atTitle").value.trim();
    if (!section || !title) { ov.querySelector("#atTitle").focus(); return; }
    const owner = ov.querySelector("#atOwner").value.trim() || null;
    const due = ov.querySelector("#atDue").value || null;
    close();
    await addTask(section, title, owner, due);
  };
}

/* ---------- עריכת משימה (מודאל) ---------- */
function openEditTask(id) {
  const t = tasks.find(x => x.id === id); if (!t) return;
  const order = [...new Set(tasks.map(x => x.section))];
  const opts = order.map(s => `<option value="${esc(s)}" ${s === t.section ? "selected" : ""}>${esc(s)}</option>`).join("");
  const { ov, close } = openOverlay(`
    <h2>עריכת משימה</h2>
    <label>קטגוריה</label>
    <select id="etSec">${opts}</select>
    <label>תיאור המשימה</label>
    <input id="etTitle" value="${esc(t.title)}">
    <label>אחראי</label>
    <input id="etOwner" value="${esc(t.owner || "")}" placeholder="—">
    <label>תאריך יעד</label>
    <input type="date" id="etDue" value="${t.due_date || ""}">
    <button class="primary" id="etSave">שמירת שינויים</button>`, true);
  ov.querySelector("#etTitle").focus();
  ov.querySelector("#etSave").onclick = async () => {
    const title = ov.querySelector("#etTitle").value.trim();
    if (!title) { ov.querySelector("#etTitle").focus(); return; }
    const patch = {
      section: ov.querySelector("#etSec").value,
      title,
      owner: ov.querySelector("#etOwner").value.trim() || null,
      due_date: ov.querySelector("#etDue").value || null
    };
    Object.assign(t, patch);
    close(); render(); toast("המשימה עודכנה");
    await supa.from("tasks").update(patch).eq("id", id);
  };
}

/* ---------- פעולות ---------- */
async function toggleDone(id, checked) {
  const t = tasks.find(x => x.id === id); if (!t) return;
  t.done = checked; t.done_by = checked ? myName : null; t.done_at = checked ? new Date().toISOString() : null;
  render();
  await supa.from("tasks").update({ done: t.done, done_by: t.done_by, done_at: t.done_at }).eq("id", id);
}
async function saveField(id, field, value) {
  const t = tasks.find(x => x.id === id); if (!t) return;
  t[field] = value || null;
  await supa.from("tasks").update({ [field]: value || null }).eq("id", id);
}
async function addNote(id) {
  const text = (noteDrafts[id] || "").trim(); if (!text) return;
  const t = tasks.find(x => x.id === id); if (!t) return;
  const notes = Array.isArray(t.notes) ? t.notes.slice() : [];
  notes.push({ by: myName, text, at: new Date().toISOString() });
  t.notes = notes; noteDrafts[id] = ""; openNotes.add(id); render();
  await supa.from("tasks").update({ notes }).eq("id", id);
}
function deleteTask(id) {
  const t = tasks.find(x => x.id === id);
  confirmDialog(`למחוק את "${t ? esc(t.title) : "המשימה"}"?`, async () => {
    tasks = tasks.filter(x => x.id !== id); render();
    await supa.from("tasks").delete().eq("id", id); toast("המשימה נמחקה");
  });
}
async function addTask(section, title, owner, due) {
  const maxPos = tasks.reduce((m, t) => Math.max(m, t.position || 0), 0);
  const row = { section, title, position: maxPos + 1, notes: [] };
  if (owner) row.owner = owner;
  if (due) row.due_date = due;
  const { data } = await supa.from("tasks").insert(row).select().single();
  if (data) { tasks.push(data); render(); toast("המשימה נוספה"); }
}

/* ---------- תצוגה ---------- */
function esc(s) { return (s || "").replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;"); }
function fmtDate(iso) {
  if (!iso) return "";
  const d = new Date(iso);
  return d.toLocaleDateString("he-IL", { day:"2-digit", month:"2-digit" }) + " " + d.toLocaleTimeString("he-IL", { hour:"2-digit", minute:"2-digit" });
}
function render() {
  const total = tasks.length, done = tasks.filter(t => t.done).length;
  const pct = total ? Math.round(done / total * 100) : 0;
  document.getElementById("progFill").style.width = pct + "%";
  document.getElementById("progLabel").textContent = `${done} מתוך ${total} הושלמו · ${pct}%`;

  const order = []; const groups = {};
  for (const t of tasks) { if (!groups[t.section]) { groups[t.section] = []; order.push(t.section); } groups[t.section].push(t); }

  let html = `<div class="toolbar"><button class="btn-primary" id="newTaskBtn">＋ משימה חדשה</button></div>`;
  for (const sec of order) {
    const items = groups[sec];
    const sdone = items.filter(t => t.done).length;
    const collapsed = collapsedSections.has(sec) ? " collapsed" : "";
    html += `<section class="section${collapsed}"><div class="section-head" data-toggle="${esc(sec)}"><span class="chev">▼</span><span style="flex:1">${esc(sec)}</span><span class="count">${sdone}/${items.length}</span></div><div class="tasks">`;
    for (const t of items) html += taskHtml(t);
    html += `</div></section>`;
  }
  if (!total) html += `<p style="color:var(--muted);text-align:center;margin-top:30px">אין משימות עדיין. לחץ על "משימה חדשה" כדי להתחיל.</p>`;
  app.innerHTML = html; wire();
}
function taskHtml(t) {
  const notes = Array.isArray(t.notes) ? t.notes : [];
  const isOpen = openNotes.has(t.id);
  let notesHtml = "";
  if (isOpen) {
    notesHtml = `<div class="notes">`;
    for (const n of notes) notesHtml += `<div class="note"><span class="note-by">${esc(n.by)}:</span><span class="note-text">${esc(n.text)} <span class="note-meta">(${fmtDate(n.at)})</span></span></div>`;
    notesHtml += `<div class="note-add"><input data-note="${t.id}" placeholder="הוסף הערה…" value="${esc(noteDrafts[t.id] || "")}"><button data-addnote="${t.id}">שלח</button></div></div>`;
  }
  const doneInfo = t.done && t.done_by ? `<span class="donemark">✓ ${esc(t.done_by)} · ${fmtDate(t.done_at)}</span>` : "";
  return `<div class="task ${t.done ? "done" : ""}">
    <div class="task-main">
      <input type="checkbox" class="check" data-check="${t.id}" ${t.done ? "checked" : ""} aria-label="סימון הושלם">
      <div class="task-body">
        <div class="title-line">
          <span class="title">${esc(t.title)}</span>
          <button class="icon-btn" data-edit="${t.id}" title="עריכה" aria-label="עריכה">✎</button>
          <button class="icon-btn danger" data-del="${t.id}" title="מחיקה" aria-label="מחיקה">🗑</button>
        </div>
        <div class="meta">
          <span>אחראי: <input class="owner" data-owner="${t.id}" value="${esc(t.owner || "")}" placeholder="—"></span>
          <span>תאריך יעד: <input type="date" data-due="${t.id}" value="${t.due_date || ""}"></span>
          ${doneInfo}
        </div>
        <button class="note-toggle" data-notetoggle="${t.id}">${isOpen ? "הסתר הערות" : `הערות (${notes.length})`}</button>
        ${notesHtml}
      </div>
    </div>
  </div>`;
}
function wire() {
  const nb = document.getElementById("newTaskBtn");
  if (nb) nb.onclick = openAddTask;
  document.querySelectorAll("[data-toggle]").forEach(el => el.onclick = () => {
    const s = el.getAttribute("data-toggle");
    collapsedSections.has(s) ? collapsedSections.delete(s) : collapsedSections.add(s); render();
  });
  document.querySelectorAll("[data-check]").forEach(el => el.onchange = () => toggleDone(el.getAttribute("data-check"), el.checked));
  document.querySelectorAll("[data-del]").forEach(el => el.onclick = () => deleteTask(el.getAttribute("data-del")));
  document.querySelectorAll("[data-edit]").forEach(el => el.onclick = () => openEditTask(el.getAttribute("data-edit")));
  document.querySelectorAll("[data-owner]").forEach(el => el.onchange = () => saveField(el.getAttribute("data-owner"), "owner", el.value.trim()));
  document.querySelectorAll("[data-due]").forEach(el => el.onchange = () => saveField(el.getAttribute("data-due"), "due_date", el.value));
  document.querySelectorAll("[data-notetoggle]").forEach(el => el.onclick = () => {
    const id = el.getAttribute("data-notetoggle");
    openNotes.has(id) ? openNotes.delete(id) : openNotes.add(id); render();
  });
  document.querySelectorAll("[data-note]").forEach(el => {
    el.oninput = () => { noteDrafts[el.getAttribute("data-note")] = el.value; };
    el.onkeydown = (e) => { if (e.key === "Enter") addNote(el.getAttribute("data-note")); };
  });
  document.querySelectorAll("[data-addnote]").forEach(el => el.onclick = () => addNote(el.getAttribute("data-addnote")));
}

init();
</script>
</body>
</html>
